<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ChatPix — كيجو</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05050f;--s1:#0a0a1a;--s2:#0f0f22;--s3:#161630;
  --pink:#ff1a6c;--pink2:#ff5599;--pink-glow:rgba(255,26,108,.45);
  --cyan:#00e5ff;--cyan-glow:rgba(0,229,255,.35);
  --green:#00ff88;--text:#eeeeff;--muted:#556688;
  --border:rgba(255,255,255,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100dvh;overflow:hidden;background:var(--bg);font-family:'Cairo',sans-serif;color:var(--text);}

/* تحسين للجوال: ملء الشاشة بالكامل */
.app{
  position:relative;z-index:1;width:100%;height:100dvh;
  display:flex;flex-direction:column;background:linear-gradient(170deg,#0c0c20 0%,var(--bg) 100%);
  overflow:hidden;
}
@media(min-width:500px){
  .app{max-width:440px;height:92vh;margin:auto;border-radius:28px;border:1px solid rgba(255,26,108,.2);box-shadow:0 50px 100px rgba(0,0,0,.8);}
}

/* Ambient Background */
.amb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;opacity:0.5;}
.a1{width:300px;height:300px;background:var(--pink);top:-100px;right:-100px;}
.a2{width:300px;height:300px;background:var(--cyan);bottom:-100px;left:-100px;}

/* Screens System */
.screen{width:100%;height:100%;display:none;flex-direction:column;position:relative;}
.screen.active{display:flex;animation:fadeIn 0.3s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

/* Auth Screen */
#auth{justify-content:center;padding:20px;text-align:center;}
.brand{font-family:'Orbitron',sans-serif;font-size:2.5rem;background:linear-gradient(to right,#fff,var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:5px;}
.auth-card{background:var(--s2);padding:25px;border-radius:20px;border:1px solid var(--border);box-shadow:0 10px 30px rgba(0,0,0,0.5);}

/* Header */
.chat-hdr{background:rgba(8,8,22,0.9);backdrop-filter:blur(10px);padding:15px;border-bottom:1px solid var(--border);}
.hdr-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.id-pill{background:rgba(0,229,255,0.1);padding:5px 12px;border-radius:50px;border:1px solid rgba(0,229,255,0.2);display:flex;align-items:center;gap:8px;}
.id-val{font-family:'Orbitron',sans-serif;color:var(--cyan);font-size:0.8rem;}

/* Messages Area */
.msgs{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:10px;}
.msg{max-width:85%;padding:10px 14px;border-radius:18px;font-size:0.95rem;line-height:1.4;position:relative;animation:slideUp 0.2s ease;}
@keyframes slideUp{from{transform:translateY(10px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.msg-me{align-self:flex-start;background:linear-gradient(135deg,var(--pink),#aa1144);border-bottom-right-radius:4px;}
.msg-you{align-self:flex-end;background:var(--s3);border:1px solid var(--border);border-bottom-left-radius:4px;}
.msg-img{max-width:100%;border-radius:12px;margin-top:5px;display:block;}

/* Input Area */
.input-area{background:var(--s2);padding:10px 15px 25px 15px;border-top:1px solid var(--border);}
.input-row{display:flex;gap:8px;align-items:center;}
.msg-in{flex:1;background:var(--bg);border:1px solid var(--border);color:#fff;padding:12px;border-radius:12px;outline:none;font-family:inherit;}
.icon-btn{background:var(--s3);border:1px solid var(--border);color:var(--text);width:45px;height:45px;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.icon-btn:active{transform:scale(0.9);}
.send-btn{background:var(--pink);border:none;color:#fff;padding:0 20px;height:45px;border-radius:12px;font-weight:bold;cursor:pointer;}
.send-btn:active{transform:scale(0.95);}

/* Album Overlay */
#album{position:absolute;inset:0;background:var(--bg);z-index:100;padding:20px;display:none;flex-direction:column;}
#album.open{display:flex;}
.album-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;overflow-y:auto;margin-top:15px;}
.alb-img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;border:2px solid transparent;}

#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(255,26,108,0.9);color:#fff;padding:8px 20px;border-radius:50px;font-size:0.8rem;z-index:1000;display:none;}
</style>
</head>
<body>
<div class="amb a1"></div><div class="amb a2"></div>

<div class="app">
  <div id="auth" class="screen active">
    <div class="brand">ChatPix</div>
    <p style="color:var(--muted);margin-bottom:30px;font-size:0.8rem;">بواسطة كيجو — مشفر وآمن</p>
    <div class="auth-card">
      <button class="send-btn" style="width:100%;margin-bottom:15px;" onclick="generateNewID()">إنشاء رقم جديد ✦</button>
      <div style="color:var(--muted);font-size:0.7rem;margin-bottom:15px;">أو ادخل برقمك</div>
      <input type="tel" id="login-id" class="msg-in" placeholder="10 أرقام" maxlength="10" style="text-align:center;letter-spacing:3px;margin-bottom:10px;">
      <button class="icon-btn" style="width:100%;" onclick="loginWithID()">🔐 دخول</button>
    </div>
  </div>

  <div id="main" class="screen">
    <div class="chat-hdr">
      <div class="hdr-row1">
        <div class="id-pill">
          <span style="font-size:0.6rem;color:var(--muted);">ID:</span>
          <span class="id-val" id="id-display">0000000000</span>
        </div>
        <button class="icon-btn" style="width:35px;height:35px;font-size:0.8rem;" onclick="clearChat()">🗑️</button>
      </div>
      <div class="input-row">
        <input type="tel" id="friend-in" class="msg-in" placeholder="رقم الصديق..." maxlength="10">
        <button class="icon-btn" onclick="startChat()">🔍</button>
      </div>
    </div>

    <div class="msgs" id="msgs">
        <div style="text-align:center;color:var(--muted);margin-top:50px;">ابحث عن رقم لتبدأ الدردشة...</div>
    </div>

    <div class="input-area">
      <div id="prev" style="display:none;margin-bottom:10px;position:relative;">
        <img id="prev-img" style="height:60px;border-radius:8px;">
        <button onclick="cancelMedia()" style="position:absolute;top:0;background:red;color:#fff;border:none;border-radius:50%;width:20px;height:20px;">×</button>
      </div>
      <div class="input-row">
        <input type="file" id="img-in" style="display:none;" accept="image/*" onchange="handleImage(event)">
        <button class="icon-btn" onclick="document.getElementById('img-in').click()">📎</button>
        <button class="icon-btn" onclick="openAlbum()">🖼</button>
        <input type="text" id="msg-in" class="msg-in" placeholder="اكتب هنا...">
        <button class="send-btn" onclick="sendMsg()">↑</button>
      </div>
    </div>
  </div>

  <div id="album">
    <div class="hdr-row1">
      <h3 style="color:var(--pink)">الألبوم</h3>
      <button class="icon-btn" onclick="closeAlbum()">✕</button>
    </div>
    <input type="file" id="add-in" style="display:none;" accept="image/*" onchange="addToAlbum(event)">
    <button class="send-btn" style="width:100%;" onclick="document.getElementById('add-in').click()">+ إضافة ريأكشن</button>
    <div class="album-grid" id="album-grid"></div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, serverTimestamp, remove, onChildRemoved, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDTAnjwBeIrkoT-y6E5rLk63avEyxTJJ7c",
  authDomain: "chatpix-e7d44.firebaseapp.com",
  projectId: "chatpix-e7d44",
  storageBucket: "chatpix-e7d44.firebasestorage.app",
  messagingSenderId: "1016461835032",
  appId: "1:1016461835032:web:4fa0ae019dd252b6abbc6d",
  databaseURL: "https://chatpix-e7d44-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// --- نظام الأصوات ---
function playBtnSound() {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
  osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}

function playMsgSound() {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.frequency.setValueAtTime(800, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.3);
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
  osc.start(); osc.stop(audioCtx.currentTime + 0.3);
}

// أضف صوت لكل زر
document.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => { if(audioCtx.state === 'suspended') audioCtx.resume(); playBtnSound(); });
});

// --- التشفير ---
const SALT = "KEIJO_SECURE_2025";
async function deriveKey(room) {
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey("raw", enc.encode(room + SALT), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2", salt:enc.encode(SALT), iterations:1000, hash:"SHA-256"}, km, {name:"AES-GCM",length:256}, false, ["encrypt","decrypt"]);
}

// --- المنطق الأساسي ---
let myID = localStorage.getItem('cpx_id'), room = null, roomKey = null, media = null;

if(myID) showMain();

window.generateNewID = () => {
    myID = Math.floor(1000000000 + Math.random() * 9000000000).toString();
    localStorage.setItem('cpx_id', myID);
    showMain();
};

window.loginWithID = () => {
    const val = document.getElementById('login-id').value;
    if(val.length === 10) { myID = val; localStorage.setItem('cpx_id', myID); showMain(); }
    else toast("أدخل 10 أرقام!");
};

function showMain() {
    document.getElementById('auth').classList.remove('active');
    document.getElementById('main').classList.add('active');
    document.getElementById('id-display').textContent = myID;
    loadAlbum();
}

window.startChat = async () => {
    const fid = document.getElementById('friend-in').value;
    if(fid.length !== 10 || fid === myID) return toast("رقم غير صالح!");
    room = myID < fid ? `${myID}_${fid}` : `${fid}_${myID}`;
    roomKey = await deriveKey(room);
    document.getElementById('msgs').innerHTML = '';
    toast("تم الاتصال المشفر ✅");

    const chatRef = ref(db, 'rooms/' + room + '/m');
    onChildAdded(query(chatRef, limitToLast(50)), async (snap) => {
        const d = snap.val();
        const isMe = d.uid === myID;
        let txt = ""; 
        if(d.ct) {
            try {
                const buf = Uint8Array.from(atob(d.ct), c => c.charCodeAt(0));
                const dec = await crypto.subtle.decrypt({name:"AES-GCM",iv:buf.slice(0,12)}, roomKey, buf.slice(12));
                txt = new TextDecoder().decode(dec);
            } catch(e) { txt = "🔒 رسالة مشفرة"; }
        }
        renderMsg(txt, d.md, isMe);
        if(!isMe) playMsgSound();
    });

    onChildRemoved(chatRef, () => {
        document.getElementById('msgs').innerHTML = '<div style="text-align:center;color:var(--muted);">تم مسح المحادثة 🧹</div>';
    });
};

window.sendMsg = async () => {
    if(!room) return toast("ابحث عن صديق!");
    const inp = document.getElementById('msg-in');
    if(!inp.value && !media) return;
    
    let ct = "";
    if(inp.value) {
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const enc = await crypto.subtle.encrypt({name:"AES-GCM",iv}, roomKey, new TextEncoder().encode(inp.value));
        const buf = new Uint8Array(12 + enc.byteLength);
        buf.set(iv); buf.set(new Uint8Array(enc), 12);
        ct = btoa(String.fromCharCode(...buf));
    }
    
    push(ref(db, 'rooms/' + room + '/m'), { uid: myID, ct, md: media, ts: serverTimestamp() });
    inp.value = ''; cancelMedia();
};

function renderMsg(txt, img, isMe) {
    const box = document.getElementById('msgs');
    const div = document.createElement('div');
    div.className = `msg ${isMe ? 'msg-me' : 'msg-you'}`;
    if(txt) div.innerHTML = `<div>${txt}</div>`;
    if(img) div.innerHTML += `<img src="${img}" class="msg-img">`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

// الألبوم والوسائط
window.handleImage = e => {
    const reader = new FileReader();
    reader.onload = () => { media = reader.result; document.getElementById('prev-img').src = media; document.getElementById('prev').style.display = 'block'; };
    reader.readAsDataURL(e.target.files[0]);
};
window.cancelMedia = () => { media = null; document.getElementById('prev').style.display = 'none'; };
window.openAlbum = () => document.getElementById('album').classList.add('open');
window.closeAlbum = () => document.getElementById('album').classList.remove('open');
window.addToAlbum = e => {
    const r = new FileReader();
    r.onload = () => {
        let a = JSON.parse(localStorage.getItem('cpx_album') || '[]');
        a.push(r.result); localStorage.setItem('cpx_album', JSON.stringify(a));
        loadAlbum();
    };
    r.readAsDataURL(e.target.files[0]);
};
function loadAlbum() {
    const g = document.getElementById('album-grid'); g.innerHTML = '';
    JSON.parse(localStorage.getItem('cpx_album') || '[]').forEach(src => {
        const img = document.createElement('img'); img.src = src; img.className = 'alb-img';
        img.onclick = () => { media = src; document.getElementById('prev-img').src = src; document.getElementById('prev').style.display = 'block'; closeAlbum(); playBtnSound(); };
        g.appendChild(img);
    });
}

window.clearChat = () => {
    if(room && confirm("مسح المحادثة للطرفين؟")) remove(ref(db, 'rooms/' + room + '/m'));
};

function toast(m) {
    const t = document.getElementById('toast'); t.textContent = m; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2000);
}
</script>
</body>
</html>
